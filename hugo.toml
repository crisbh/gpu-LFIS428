baseURL = "https://crisbh.github.io/gpu-LFIS428/"
languageCode = "es"
title = "Programación en GPUs"
theme = "book"
enableEmoji = true

[params]
  BookTheme = 'auto'
  BookToC = true
  BookSearch = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = 'monokailight'
    tabWidth = 8

