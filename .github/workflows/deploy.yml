name: Deploy Hugo Site with Marp Slides

on:
  push:
    branches:
      - main  # Triggers deployment when pushing to main
  workflow_dispatch:

# Permissions required by the official GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Step 1: Checkout the repository with submodules
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive  # Ensures Hugo themes are cloned

    # Step 2: Configure GitHub Pages (provides baseURL etc.)
    - name: Setup Pages
      uses: actions/configure-pages@v5

    # Step 3: Install the latest Hugo Extended
    - name: Install Hugo Extended
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.128.0'
        extended: true

    # Step 4: Install Marp
    - name: Install Marp
      run: npm install -g @marp-team/marp-cli

    # Step 5: Convert Marp Slides
    - name: Convert Marp Slides
      run: |
        mkdir -p static/slides
        for file in slides/*.md; do
          filename=$(basename "$file" .md)
          marp "$file" --html --theme gaia --output "static/slides/${filename}.html"
        done

    # Step 6: Build the Hugo site
    - name: Build Hugo Site
      run: hugo --minify --cleanDestinationDir --theme hugo-book

    # Step 7: Upload the built site as a Pages artifact
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    # Step 8: Deploy the artifact to GitHub Pages
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
